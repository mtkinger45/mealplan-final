<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Meal Plan Generator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f5ef; margin: 0; padding: 24px; color: #2f2a24; }
    .wrapper { max-width: 850px; margin: 0 auto; background: #fff; padding: 28px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .logo { text-align: center; margin-bottom: 18px; }
    .logo img { max-width: 260px; height: auto; }
    h1 { text-align: center; margin-top: 0; }
    label { display: block; font-weight: 700; margin-top: 16px; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    textarea { min-height: 90px; }
    .checks { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin-top: 8px; }
    .checks label { font-weight: 400; margin: 0; display: flex; align-items: center; gap: 8px; }
    .checks input { width: auto; margin: 0; }
    button { margin-top: 18px; padding: 12px 18px; border: 0; border-radius: 8px; cursor: pointer; font-weight: 700; }
    #results { white-space: normal; background: #fbfaf7; padding: 18px; border-radius: 10px; margin-top: 20px; border: 1px solid #eee; }
    #downloadLinks a, #downloadLinks span { display: inline-block; margin: 8px 12px 8px 0; }
    .error { color: #9b1c1c; background: #fff1f1; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <main class="wrapper">
    <div class="logo">
      <img src="https://storage.googleapis.com/msgsndr/MLvzWRO6i3vfCdJZS4i6/media/6801a80310c9ded75f0b9908.png" alt="The Chaos to Confidence Collective Logo">
    </div>

    <h1>Get Your Custom Meal Plan</h1>

    <form id="combinedForm">
      <label>Your Name
        <input name="name" placeholder="Bailey" />
      </label>

      <label>How many people are you feeding?
        <input name="people" type="number" min="1" max="20" value="4" />
      </label>

      <label>How many days?
        <select name="duration">
          <option value="3">3 days</option>
          <option value="5">5 days</option>
          <option value="7" selected>7 days</option>
          <option value="14">14 days</option>
        </select>
      </label>

      <label>Start Day
        <select name="startDay">
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
      </label>

      <label>Which meals do you want?</label>
      <div class="checks">
        <label><input type="checkbox" name="meals" value="Breakfast"> Breakfast</label>
        <label><input type="checkbox" name="meals" value="Lunch"> Lunch</label>
        <label><input type="checkbox" name="meals" value="Supper" checked> Supper</label>
        <label><input type="checkbox" name="meals" value="Snack"> Snack</label>
      </div>

      <label>Diet Type
        <input name="dietType" placeholder="Any, low carb, dairy free, etc." />
      </label>

      <label>Cooking Style
        <input name="mealStyle" placeholder="simple, batch cooking, kid-friendly, crockpot, etc." />
      </label>

      <label>Foods to Avoid / Allergies
        <textarea name="avoidIngredients" placeholder="None, or list allergies/foods to avoid"></textarea>
      </label>

      <label>Special Cooking Requests
        <textarea name="cookingRequests" placeholder="Example: quick breakfasts, warm lunches, no seafood, leftovers are fine"></textarea>
      </label>

      <label>Appliances Available</label>
      <div class="checks">
        <label><input type="checkbox" name="appliances" value="Oven"> Oven</label>
        <label><input type="checkbox" name="appliances" value="Stovetop"> Stovetop</label>
        <label><input type="checkbox" name="appliances" value="Air fryer"> Air fryer</label>
        <label><input type="checkbox" name="appliances" value="Instant Pot"> Instant Pot</label>
        <label><input type="checkbox" name="appliances" value="Slow cooker"> Slow cooker</label>
        <label><input type="checkbox" name="appliances" value="Grill"> Grill</label>
      </div>

      <label>Ingredients You Already Have
        <textarea name="onHandIngredients" placeholder="Example: 2 lb ground beef, eggs, chicken thighs, zucchini"></textarea>
      </label>

      <label>Calendar / Schedule Notes
        <textarea name="calendarInsights" placeholder="Example: Tuesday is busy, need crockpot meal; Friday we eat out"></textarea>
      </label>

      <button type="submit">Generate My Meal Plan</button>
    </form>

    <div id="results" style="display: none;"></div>

    <form id="feedbackForm" style="display: none;">
      <label>Want something changed?
        <textarea name="feedback" placeholder="e.g. fewer eggs, more warm meals" required></textarea>
      </label>
      <button type="submit">Update My Plan</button>
    </form>

    <button id="reviseButton" style="display: none;">Revise My Form Answers</button>
    <button id="approveButton" style="display: none;">Yes, I Approve This Plan</button>

    <div id="downloadLinks" style="display: none;"></div>

    <script src="script.js"></script>
  </main>
</body>
</html>
